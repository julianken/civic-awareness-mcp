name: Nightly upstream drift detection

# Hits real upstream APIs once a day and asserts the response shapes the
# adapters depend on are still present. If a field name changes upstream
# (e.g. OpenStates renames `updated_at` to `updatedAt`), this job goes
# red and flags the regression before end users see broken tool output.
#
# Keys live in the repo's Actions secrets (not shipped to users). End
# users run the MCP server with their own local keys via .env.local or
# claude_desktop_config.json — see README.
#
# Scheduled live-API drift check. PR CI (typecheck/tests/build + MCP smoke)
# runs in ci.yml; this job catches upstream shape drift daily. Trigger
# manually from the Actions tab if you want to re-check immediately.

on:
  schedule:
    # 9am UTC daily = 2am PT / 5am ET. Runs after most US legislative
    # activity has settled and before people wake up to use the MCP.
    - cron: "0 9 * * *"
  workflow_dispatch:

# This workflow reads secrets but never consumes untrusted input from
# github.event.* — no command-injection surface.

jobs:
  drift:
    name: Live API shape assertions
    runs-on: ubuntu-latest
    # Short timeout — the tests make ~7 requests with 1s pauses between.
    timeout-minutes: 5

    steps:
      # Actions are pinned to full commit SHAs to prevent a force-pushed
      # tag from executing arbitrary code with access to the repo
      # secrets. Dependabot can bump these on a schedule. Tags in comments
      # are for humans reviewing the file.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Fail fast if either API key isn't set in repo Actions secrets.
      # Without this guard, `npm run test:drift` skips all tests when the
      # env vars are empty and the job passes silently — a false-positive
      # CI signal where green means "zero tests ran," not "upstream shapes
      # are intact."
      - name: Check required secrets
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          API_DATA_GOV_KEY: ${{ secrets.API_DATA_GOV_KEY }}
        run: |
          missing=()
          [ -z "$OPENSTATES_API_KEY" ] && missing+=("OPENSTATES_API_KEY")
          [ -z "$API_DATA_GOV_KEY" ]   && missing+=("API_DATA_GOV_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required Actions secrets: ${missing[*]}"
            echo "Set them at Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present; running drift suite."

      - name: Drift tests
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          API_DATA_GOV_KEY: ${{ secrets.API_DATA_GOV_KEY }}
        run: npm run test:drift
